services:
  - type: web
    name: employee-panel
    runtime: node
    plan: starter
    buildCommand: |
      npm install -g bun
      bun install
      bun run db:generate
      npx next build
      cp -r .next/static .next/standalone/.next/
      cp -r public .next/standalone/
    startCommand: node .next/standalone/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: NEXT_PUBLIC_BASE_URL
        fromService:
          name: employee-panel
          type: web
          property: hostport
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CLOUDINARY_UPLOAD_PRESET
        sync: false
      - key: NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME
        sync: false